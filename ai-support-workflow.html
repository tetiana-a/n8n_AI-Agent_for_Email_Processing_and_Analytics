<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Customer Support — Workflow Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090c;
  --surface:#0f1116;
  --surface2:#161921;
  --border:#1e2230;
  --border2:#2a3048;
  --text:#e8eaf0;
  --muted:#5a6278;
  --dim:#3a4258;
  --accent:#5b6bff;
  --accent2:#7c8cff;
  --green:#22d3a0;
  --amber:#f5a623;
  --pink:#f066c8;
  --red:#ff5c7c;
  --teal:#38d4e8;
  --purple:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden}

/* noise texture overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6
}

/* ─── HEADER ─── */
header{
  position:fixed;top:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(8,9,12,.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:200;gap:16px
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:13px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text);white-space:nowrap
}
.logo span{color:var(--accent2)}
.header-tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{
  font-size:10px;font-family:'Syne',sans-serif;font-weight:600;
  letter-spacing:.08em;padding:3px 9px;border-radius:20px;
  border:1px solid;white-space:nowrap
}
.tag-green{color:var(--green);border-color:rgba(34,211,160,.25);background:rgba(34,211,160,.06)}
.tag-amber{color:var(--amber);border-color:rgba(245,166,35,.25);background:rgba(245,166,35,.06)}
.tag-pink{color:var(--pink);border-color:rgba(240,102,200,.25);background:rgba(240,102,200,.06)}
.tag-blue{color:var(--accent2);border-color:rgba(124,140,255,.25);background:rgba(124,140,255,.06)}
.header-hint{font-size:10px;color:var(--muted);white-space:nowrap}

/* ─── LEGEND ─── */
.legend{
  position:fixed;bottom:20px;left:20px;
  display:flex;flex-direction:column;gap:6px;
  background:rgba(15,17,22,.9);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;z-index:200
}
.legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ─── CANVAS ─── */
#viewport{
  position:fixed;inset:0;padding-top:52px;overflow:hidden;z-index:1
}
#world{
  position:absolute;transform-origin:0 0;
  cursor:grab;user-select:none
}
#world.grabbing{cursor:grabbing}
svg#edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}

/* ─── NODE ─── */
.node{
  position:absolute;width:168px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0;
  cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  will-change:transform
}
.node:hover{
  border-color:var(--border2);
  box-shadow:0 0 0 1px var(--border2), 0 8px 32px rgba(0,0,0,.5);
  transform:translateY(-2px)
}
.node.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent), 0 0 24px rgba(91,107,255,.18)
}
.node-top{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px 8px
}
.node-icon{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0
}
.node-label{flex:1;min-width:0}
.node-name{
  font-family:'Syne',sans-serif;font-weight:700;font-size:10.5px;
  color:var(--text);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.node-type{font-size:9px;color:var(--muted);margin-top:1px;font-weight:300}
.node-bar{height:2px;border-radius:0 0 10px 10px;margin-top:2px}

/* icon colors */
.ic-trigger{background:rgba(34,211,160,.12);color:var(--green);border:1px solid rgba(34,211,160,.2)}
.bar-trigger{background:var(--green)}
.ic-gmail{background:rgba(255,92,124,.1);color:var(--red);border:1px solid rgba(255,92,124,.2)}
.bar-gmail{background:var(--red)}
.ic-sheets{background:rgba(34,211,160,.08);color:var(--teal);border:1px solid rgba(56,212,232,.2)}
.bar-sheets{background:var(--teal)}
.ic-code{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.bar-code{background:var(--amber)}
.ic-logic{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.bar-logic{background:var(--purple)}
.ic-ai{background:rgba(240,102,200,.1);color:var(--pink);border:1px solid rgba(240,102,200,.2)}
.bar-ai{background:var(--pink)}

/* ─── EDGE ─── */
.edge{fill:none;stroke:var(--border2);stroke-width:1.5;transition:stroke .15s}
.edge-ai{stroke-dasharray:5 4}
.edge.hl{stroke:var(--accent);opacity:1}

/* ─── PANEL ─── */
#panel{
  position:fixed;top:52px;right:0;bottom:0;width:380px;
  background:var(--surface);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:150;overflow-y:auto;
  display:flex;flex-direction:column
}
#panel.open{transform:translateX(0)}
.panel-head{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:2
}
.panel-close{
  position:absolute;top:16px;right:16px;
  background:none;border:1px solid var(--border2);
  color:var(--muted);border-radius:6px;
  width:28px;height:28px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,color .1s
}
.panel-close:hover{background:var(--border);color:var(--text)}
.panel-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;color:var(--text);padding-right:36px;line-height:1.3
}
.panel-sub{font-size:10px;color:var(--muted);margin-top:4px;font-weight:300}
.panel-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.sect-lbl{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px
}
.code-block{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:12px;font-size:10px;line-height:1.7;color:#8fa0c8;
  white-space:pre-wrap;word-break:break-word;max-height:220px;overflow-y:auto;
  font-family:'JetBrains Mono',monospace;font-weight:300
}
.code-block .kw{color:var(--accent2)}
.code-block .str{color:var(--green)}
.code-block .cmt{color:var(--dim)}
.note-box{
  background:rgba(91,107,255,.06);border:1px solid rgba(91,107,255,.15);
  border-radius:8px;padding:10px 12px;
  font-size:11px;color:#8fa0c8;line-height:1.6;font-weight:300
}
.param-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;gap:8px
}
.param-row:last-child{border-bottom:none}
.param-key{color:var(--muted);flex-shrink:0}
.param-val{color:var(--text);text-align:right;word-break:break-all;font-weight:400}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:9px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.06em
}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── ZOOM CONTROLS ─── */
.zoom-btns{
  position:fixed;bottom:20px;right:20px;
  display:flex;flex-direction:column;gap:6px;z-index:200
}
.zoom-btn{
  width:32px;height:32px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:7px;
  color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s
}
.zoom-btn:hover{background:var(--border)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.node{animation:fadeIn .4s ease both}
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>Support</span> Workflow</div>
  <div class="header-tags">
    <span class="tag tag-green">n8n Automation</span>
    <span class="tag tag-amber">GPT-4o-mini</span>
    <span class="tag tag-pink">Safe Drafts Only</span>
    <span class="tag tag-blue">Gmail + Sheets</span>
  </div>
  <span class="header-hint">drag to pan · scroll to zoom · click node to inspect</span>
</header>

<div id="viewport">
  <div id="world">
    <svg id="edges"></svg>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Trigger</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Gmail</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Google Sheets</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Code</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Logic</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>AI / LLM</div>
</div>

<div class="zoom-btns">
  <button class="zoom-btn" onclick="zoom(1.2)">+</button>
  <button class="zoom-btn" onclick="zoom(1/1.2)">−</button>
  <button class="zoom-btn" title="Fit" onclick="fitView()" style="font-size:12px;font-family:'Syne',sans-serif">FIT</button>
</div>

<div id="panel">
  <div class="panel-head">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-title" id="p-title"></div>
    <div class="panel-sub" id="p-sub"></div>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const NW=168, NH=62;

const NODES = [
  {id:'manual', name:'Manual Trigger', type:'manualTrigger', sub:'Test / manual run', ic:'ic-trigger', bar:'bar-trigger', icon:'▶', x:0,   y:120},
  {id:'sched',  name:'Every 15 Min',   type:'scheduleTrigger', sub:'Schedule trigger', ic:'ic-trigger', bar:'bar-trigger', icon:'⏱', x:0,   y:240},
  {id:'gmail1', name:'Get Support Emails', type:'gmail', sub:'Gmail · getAll · label: Support-Waiting', ic:'ic-gmail', bar:'bar-gmail', icon:'✉', x:240, y:180},
  {id:'loop',   name:'Loop Emails',    type:'splitInBatches', sub:'Process one-by-one', ic:'ic-logic', bar:'bar-logic', icon:'↻', x:460, y:180},
  {id:'prep',   name:'Prepare Email Text', type:'code', sub:'Extract & sanitise body', ic:'ic-code', bar:'bar-code', icon:'{ }', x:680, y:180},
  {id:'faq',    name:'Approved FAQ',   type:'googleSheets', sub:'Google Sheets · FAQ tab', ic:'ic-sheets', bar:'bar-sheets', icon:'⊞', x:900, y:180},
  {id:'ai',     name:'AI Classify & Draft', type:'chainLlm', sub:'LLM Chain · GPT-4o-mini', ic:'ic-ai', bar:'bar-ai', icon:'◈', x:1120, y:180},
  {id:'openai', name:'OpenAI GPT-4o-mini', type:'lmChatOpenAi', sub:'temp 0.2 · LLM', ic:'ic-ai', bar:'bar-ai', icon:'✦', x:1000, y:360},
  {id:'parser', name:'Structured Parser', type:'outputParserStructured', sub:'JSON schema enforcer', ic:'ic-ai', bar:'bar-ai', icon:'⟨/⟩', x:1200, y:360},
  {id:'norm',   name:'Normalize Output', type:'code', sub:'Merge AI + email data', ic:'ic-code', bar:'bar-code', icon:'{ }', x:1340, y:180},
  {id:'if',     name:'Needs Human Review?', type:'if', sub:'Branch on requires_human', ic:'ic-logic', bar:'bar-logic', icon:'⑂', x:1560, y:180},
  {id:'lhr',    name:'Add Human-Review Label', type:'gmail', sub:'Gmail · addLabels', ic:'ic-gmail', bar:'bar-gmail', icon:'✉', x:1780, y:60},
  {id:'draft',  name:'Create Safe Draft', type:'gmail', sub:'Gmail · reply draft', ic:'ic-gmail', bar:'bar-gmail', icon:'✉', x:1780, y:300},
  {id:'lai',    name:'Add AI-Draft Label', type:'gmail', sub:'Gmail · addLabels', ic:'ic-gmail', bar:'bar-gmail', icon:'✉', x:2000, y:300},
  {id:'log',    name:'Log to Sheets',   type:'googleSheets', sub:'Google Sheets · Logs tab', ic:'ic-sheets', bar:'bar-sheets', icon:'⊞', x:2220, y:180},
];

const EDGES = [
  {s:'manual', t:'gmail1'},
  {s:'sched',  t:'gmail1'},
  {s:'gmail1', t:'loop'},
  {s:'loop',   t:'prep'},
  {s:'prep',   t:'faq'},
  {s:'faq',    t:'ai'},
  {s:'openai', t:'ai', ai:true},
  {s:'parser', t:'ai', ai:true},
  {s:'ai',     t:'norm'},
  {s:'norm',   t:'if'},
  {s:'if',     t:'lhr'},
  {s:'if',     t:'draft'},
  {s:'lhr',    t:'log'},
  {s:'draft',  t:'lai'},
  {s:'lai',    t:'log'},
  {s:'log',    t:'loop', back:true},
];

const DETAILS = {
  manual:{title:'Manual Test Trigger',typeLabel:'n8n-nodes-base.manualTrigger',note:'Starts the workflow on-demand. Use this during development or to test a single run without waiting for the schedule.',params:[]},
  sched:{title:'Every 15 Minutes',typeLabel:'n8n-nodes-base.scheduleTrigger',note:'Automatically triggers the workflow every 15 minutes in production.',params:[{k:'Interval',v:'15 minutes'},{k:'Type',v:'Recurring'}]},
  gmail1:{title:'Gmail – Get Support Emails',typeLabel:'n8n-nodes-base.gmail',note:'Fetches up to 10 unread emails tagged "Support-Waiting" from the last 7 days. Create this Gmail label manually before activating.',params:[{k:'Operation',v:'getAll'},{k:'Limit',v:'10'},{k:'Label',v:'Support-Waiting'},{k:'Filter',v:'newer_than:7d'}]},
  loop:{title:'Loop Emails',typeLabel:'n8n-nodes-base.splitInBatches',note:'Splits the list of fetched emails into individual items, processing them one-by-one through the rest of the workflow.',params:[{k:'Batch size',v:'1 (each email separately)'}]},
  prep:{title:'Prepare Email Text',typeLabel:'n8n-nodes-base.code',note:'JavaScript code node. Extracts subject, sender and plain-text body. Strips HTML tags and collapses whitespace.',code:`const email = $json;
const subject = email.Subject || email.subject || '';
const from    = email.From    || email.from    || '';
const body = String(email.textPlain || email.snippet || '')
  .replace(/<[^>]*>/g, ' ')
  .replace(/\\s+/g, ' ')
  .trim();

return { json: {
  email_id:  email.id || '',
  thread_id: email.threadId || '',
  from, subject, body
}};`},
  faq:{title:'Google Sheets – Approved FAQ',typeLabel:'n8n-nodes-base.googleSheets',note:'Reads all rows from the FAQ tab. The AI will only use these approved answers — it cannot invent facts.',params:[{k:'Operation',v:'getAll'},{k:'Sheet',v:'FAQ'},{k:'Document ID',v:'REPLACE_WITH_GOOGLE_SHEET_ID'},{k:'Columns',v:'category | question | approved_answer | template_key'}]},
  ai:{title:'AI – Classify and Draft Safely',typeLabel:'@n8n/n8n-nodes-langchain.chainLlm',note:'Core AI node. Combines the email and FAQ rows into a prompt for GPT-4o-mini. Returns structured JSON with a draft reply or requires_human=true.',system:`You are a careful customer support AI.
Return ONLY valid JSON. Never send an email directly.
Create draft text only.
If the message contains:
  complaint, legal threat, payment dispute,
  personal data issue, refund demand,
  aggressive tone, unclear pricing
→ set requires_human = true.
Do not hallucinate. Use approved templates only.`,prompt:`Subject: {{ subject }}
From: {{ from }}
Body: {{ body }}

Approved FAQ rows:
{{ faq rows (JSON) }}

Classify the email and draft a reply.
Use ONLY approved FAQ / template information.
If no approved answer matches → requires_human=true.`},
  openai:{title:'OpenAI Chat Model',typeLabel:'@n8n/n8n-nodes-langchain.lmChatOpenAi',note:'Provides the language model to the AI chain. Low temperature keeps replies factual and consistent.',params:[{k:'Model',v:'gpt-4o-mini'},{k:'Temperature',v:'0.2'}]},
  parser:{title:'Structured Output Parser',typeLabel:'@n8n/n8n-nodes-langchain.outputParserStructured',note:'Forces the LLM to return a valid JSON object matching the schema below. Prevents hallucinated or missing fields.',schema:`{
  priority:       "P1" | "P2" | "P3" | "P4",
  category:       string,
  intent:         string,
  sentiment:      "positive" | "neutral" | "negative",
  template_key:   string,
  draft_subject:  string,
  draft_body:     string,
  requires_human: boolean,
  reason:         string
}`},
  norm:{title:'Normalize AI Output',typeLabel:'n8n-nodes-base.code',note:'Merges AI output with the original email fields. Applies safe defaults (P4, "Other") when the AI omits optional fields.',code:`const ai    = $json.output || $json;
const email = $('Prepare Email Text').item.json;

return { json: {
  email_id:   email.email_id,
  thread_id:  email.thread_id,
  from:       email.from,
  original_subject: email.subject,
  priority:   ai.priority  || 'P4',
  category:   ai.category  || 'Other',
  intent:     ai.intent    || '',
  sentiment:  ai.sentiment || 'neutral',
  template_key:   ai.template_key  || '',
  draft_subject:  ai.draft_subject || 'Re: ' + email.subject,
  draft_body:     ai.draft_body    || '',
  requires_human: Boolean(ai.requires_human),
  reason:         ai.reason || '',
  processed_at: new Date().toISOString()
}};`},
  if:{title:'Needs Human Review?',typeLabel:'n8n-nodes-base.if',note:'Branches based on the requires_human flag set by the AI. True output → human label path. False output → safe draft path.',params:[{k:'Condition',v:'requires_human === true'},{k:'True path →',v:'Gmail: Add Human-Review label'},{k:'False path →',v:'Gmail: Create Safe Draft'}]},
  lhr:{title:'Gmail – Add Human-Review Label',typeLabel:'n8n-nodes-base.gmail',note:'Tags the email so a human agent picks it up. The AI does NOT draft a reply for these cases.',params:[{k:'Operation',v:'addLabels'},{k:'Label',v:'Human-Review'}]},
  draft:{title:'Gmail – Create Safe Draft',typeLabel:'n8n-nodes-base.gmail',note:'Creates a reply DRAFT — it is never sent automatically. An agent must review and send manually.',params:[{k:'Operation',v:'reply (draft)'},{k:'Message',v:'{{ draft_body }}'},{k:'Auto-send',v:'❌ Never'}]},
  lai:{title:'Gmail – Add AI-Draft Label',typeLabel:'n8n-nodes-base.gmail',note:'Tags the email so agents know an AI draft is ready and waiting for their review.',params:[{k:'Operation',v:'addLabels'},{k:'Label',v:'AI-Draft'}]},
  log:{title:'Google Sheets – Log Result',typeLabel:'n8n-nodes-base.googleSheets',note:'Appends a row to the Logs tab for every processed email, regardless of outcome. Used for auditing and analytics.',params:[{k:'Operation',v:'append'},{k:'Sheet',v:'Logs'},{k:'Columns',v:'processed_at, email_id, from, subject, priority, category, sentiment, requires_human, reason'}]},
};

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const world = document.getElementById('world');
const svg   = document.getElementById('edges');
let scale=1, ox=40, oy=80;
let dragging=false, lastX=0, lastY=0;

function applyTransform(){world.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`}
applyTransform();

// pan
document.getElementById('viewport').addEventListener('mousedown',e=>{
  if(e.target.closest('.node')||e.target.closest('#panel'))return;
  dragging=true;lastX=e.clientX;lastY=e.clientY;
  world.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  ox+=e.clientX-lastX;oy+=e.clientY-lastY;
  lastX=e.clientX;lastY=e.clientY;applyTransform();
});
window.addEventListener('mouseup',()=>{dragging=false;world.classList.remove('grabbing')});

// scroll zoom
document.getElementById('viewport').addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const vp=document.getElementById('viewport');
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top-52;
  ox=(ox-mx)*delta+mx;
  oy=(oy-my)*delta+my;
  scale*=delta;applyTransform();
},{passive:false});

function zoom(f){
  const vp=document.getElementById('viewport');
  const r=vp.getBoundingClientRect();
  const cx=r.width/2,cy=(r.height-52)/2;
  ox=(ox-cx)*f+cx;oy=(oy-cy)*f+cy;scale*=f;applyTransform();
}
function fitView(){
  const xs=NODES.map(n=>n.x),ys=NODES.map(n=>n.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs)+NW;
  const minY=Math.min(...ys),maxY=Math.max(...ys)+NH;
  const vp=document.getElementById('viewport');
  const vw=vp.clientWidth,vh=vp.clientHeight-52;
  const pad=60;
  const sf=Math.min((vw-pad*2)/(maxX-minX),(vh-pad*2)/(maxY-minY));
  scale=Math.min(sf,.95);
  ox=pad-minX*scale;oy=pad-minY*scale;
  applyTransform();
}

// ── BUILD NODES ───────────────────────────────────────────────────────────────
NODES.forEach((n,i)=>{
  const el=document.createElement('div');
  el.className='node';
  el.id='n-'+n.id;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;animation-delay:${i*0.04}s`;
  el.innerHTML=`
    <div class="node-top">
      <div class="node-icon ${n.ic}">${n.icon}</div>
      <div class="node-label">
        <div class="node-name">${n.name}</div>
        <div class="node-type">${n.sub}</div>
      </div>
    </div>
    <div class="node-bar ${n.bar}"></div>`;
  el.addEventListener('click',()=>openPanel(n.id));
  world.appendChild(el);
});

// ── BUILD EDGES ───────────────────────────────────────────────────────────────
function buildEdges(){
  svg.innerHTML='<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
  EDGES.forEach(e=>{
    const s=NODES.find(n=>n.id===e.s);
    const t=NODES.find(n=>n.id===e.t);
    if(!s||!t)return;
    const x1=s.x+NW, y1=s.y+NH/2;
    const x2=t.x,    y2=t.y+NH/2;
    let d;
    if(e.ai){
      // curve up from AI sub-nodes
      const mx=(x1+x2)/2;
      d=`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;
    } else if(e.back){
      // loop-back arc underneath
      const my=Math.max(s.y,t.y)+NH+80;
      d=`M${s.x+NW/2} ${s.y+NH} Q${(s.x+t.x+NW)/2} ${my} ${t.x+NW/2} ${t.y+NH}`;
    } else {
      const mx=(x1+x2)/2;
      d=`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;
    }
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('class','edge'+(e.ai?' edge-ai':''));
    path.setAttribute('marker-end','url(#arr)');
    path.dataset.s=e.s;path.dataset.t=e.t;
    svg.appendChild(path);
  });
}
buildEdges();

// ── PANEL ─────────────────────────────────────────────────────────────────────
let activeId=null;

function openPanel(id){
  if(activeId){document.getElementById('n-'+activeId)?.classList.remove('active')}
  activeId=id;
  document.getElementById('n-'+id)?.classList.add('active');
  // highlight edges
  svg.querySelectorAll('.edge').forEach(p=>{
    p.classList.toggle('hl',p.dataset.s===id||p.dataset.t===id);
  });
  const d=DETAILS[id];
  if(!d)return;
  document.getElementById('p-title').textContent=d.title;
  document.getElementById('p-sub').textContent=d.typeLabel;
  let html='';
  if(d.note){html+=`<div><div class="sect-lbl">About</div><div class="note-box">${d.note}</div></div>`;}
  if(d.params&&d.params.length){
    html+=`<div><div class="sect-lbl">Parameters</div><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 12px">`;
    d.params.forEach(p=>{html+=`<div class="param-row"><span class="param-key">${p.k}</span><span class="param-val">${p.v}</span></div>`;});
    html+=`</div></div>`;
  }
  if(d.code){html+=`<div><div class="sect-lbl">JavaScript Code</div><div class="code-pre-wrap"><pre class="code-block">${esc(d.code)}</pre></div></div>`;}
  if(d.system){html+=`<div><div class="sect-lbl">System Message</div><pre class="code-block">${esc(d.system)}</pre></div>`;}
  if(d.prompt){html+=`<div><div class="sect-lbl">Prompt Template</div><pre class="code-block">${esc(d.prompt)}</pre></div>`;}
  if(d.schema){html+=`<div><div class="sect-lbl">Output JSON Schema</div><pre class="code-block">${esc(d.schema)}</pre></div>`;}
  document.getElementById('p-body').innerHTML=html;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  if(activeId){document.getElementById('n-'+activeId)?.classList.remove('active');activeId=null;}
  svg.querySelectorAll('.edge').forEach(p=>p.classList.remove('hl'));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// auto-fit on load
window.addEventListener('load',()=>setTimeout(fitView,60));
</script>
